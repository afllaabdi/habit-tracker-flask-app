<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar | HabitFlow</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo"><i class="fas fa-user-plus"></i></div>
            <h1>Buat Akun</h1>
            <p>Mulai perjalanan disiplinmu!</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input name="username" type="text" placeholder="Username Baru" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input name="password" type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login">Daftar Sekarang</button>
        </form>
        <div class="auth-footer">
            <p>Sudah punya akun? <a href="/">Login di sini</a></p>
        </div>
    </div>
</div>
</body>
</html>
